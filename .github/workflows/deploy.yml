name: Deploy

on:
  workflow_run:
    workflows: [Build]
    types: [completed]
    branches: [main]

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  validate-manifests:
    name: Validate K8s Manifests
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Validate namespace
        run: kubectl apply --dry-run=client --validate=false -f k8s/namespace.yaml

      - name: Validate backend manifests
        run: kubectl apply --dry-run=client --validate=false -f k8s/backend/

      - name: Validate frontend manifests
        run: kubectl apply --dry-run=client --validate=false -f k8s/frontend/

      - name: Validate ingress
        run: kubectl apply --dry-run=client --validate=false -f k8s/ingress.yaml

      - name: Validate Istio Gateway
        run: kubectl apply --dry-run=client --validate=false -f k8s/istio/gateway.yaml

      - name: Validate Istio VirtualServices
        run: |
          kubectl apply --dry-run=client --validate=false -f k8s/istio/virtualservice-backend.yaml
          kubectl apply --dry-run=client --validate=false -f k8s/istio/virtualservice-frontend.yaml

      - name: Validate Istio DestinationRule
        run: kubectl apply --dry-run=client --validate=false -f k8s/istio/destinationrule-backend.yaml

      - name: Validate Istio Security policies
        run: |
          kubectl apply --dry-run=client --validate=false -f k8s/istio/authz-policy.yaml
          kubectl apply --dry-run=client --validate=false -f k8s/istio/mtls-peer-auth.yaml

      - name: Write deploy instructions to job summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## ✅ Manifests validated — ready to deploy

          ### Images built
          | Service   | Image |
          |-----------|-------|
          | mesh-api  | `${{ env.IMAGE_PREFIX }}/k8s-istio-platform-backend:${{ github.sha }}` |
          | mesh-ui   | `${{ env.IMAGE_PREFIX }}/k8s-istio-platform-frontend:${{ github.sha }}` |

          ### Deploy to Minikube (local)
          ```bash
          # Start cluster and enable addons
          minikube start
          minikube addons enable ingress
          istioctl install --set profile=demo -y
          kubectl label namespace backend istio-injection=enabled --overwrite
          kubectl label namespace frontend istio-injection=enabled --overwrite

          # Pull images from GHCR into minikube
          minikube image pull ${{ env.IMAGE_PREFIX }}/k8s-istio-platform-backend:${{ github.sha }}
          minikube image pull ${{ env.IMAGE_PREFIX }}/k8s-istio-platform-frontend:${{ github.sha }}

          # Apply manifests
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/backend/
          kubectl apply -f k8s/frontend/
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/istio/

          # Wait for rollout
          kubectl rollout status deployment/mesh-api -n backend --timeout=120s
          kubectl rollout status deployment/mesh-ui -n frontend --timeout=120s
          ```

          ### Add to /etc/hosts
          ```
          $(minikube ip)  k8s-istio-platform.backend.local
          $(minikube ip)  k8s-istio-platform.frontend.local
          ```
          EOF

  deploy-dev:
    name: Deploy → dev (manual)
    runs-on: ubuntu-latest
    needs: validate-manifests
    environment: dev
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy instructions
        run: |
          echo "::notice::Cluster deploy is manual for this portfolio project."
          echo "::notice::Run deploy.sh locally after pulling images from GHCR."
          echo "::notice::Backend image:  ${{ env.IMAGE_PREFIX }}/k8s-istio-platform-backend:${{ github.sha }}"
          echo "::notice::Frontend image: ${{ env.IMAGE_PREFIX }}/k8s-istio-platform-frontend:${{ github.sha }}"

  deploy-prod:
    name: Deploy → prod (manual approval)
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: prod
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy instructions
        run: |
          echo "::notice::Production deploy approved."
          echo "::notice::Backend image:  ${{ env.IMAGE_PREFIX }}/k8s-istio-platform-backend:${{ github.sha }}"
          echo "::notice::Frontend image: ${{ env.IMAGE_PREFIX }}/k8s-istio-platform-frontend:${{ github.sha }}"
