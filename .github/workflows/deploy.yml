name: Deploy

on:
  workflow_run:
    workflows: [Build]
    types: [completed]
    branches: [main]

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  deploy-dev:
    name: Deploy → dev
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Set up Terragrunt
        run: |
          curl -sL https://github.com/gruntwork-io/terragrunt/releases/download/v0.55.0/terragrunt_linux_amd64 \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Terragrunt apply — dev
        working-directory: iac/environments/dev
        run: terragrunt apply -auto-approve
        env:
          TF_VAR_backend_image: ${{ env.IMAGE_PREFIX }}/k8s-istio-platform-backend:${{ github.sha }}
          TF_VAR_frontend_image: ${{ env.IMAGE_PREFIX }}/k8s-istio-platform-frontend:${{ github.sha }}

      - name: Wait for rollout — dev
        run: |
          kubectl rollout status deployment/mesh-api -n k8s-istio-platform-dev --timeout=120s
          kubectl rollout status deployment/mesh-ui -n k8s-istio-platform-dev --timeout=120s

  deploy-prod:
    name: Deploy → prod
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: prod           # requires manual approval in GitHub

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Set up Terragrunt
        run: |
          curl -sL https://github.com/gruntwork-io/terragrunt/releases/download/v0.55.0/terragrunt_linux_amd64 \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Terragrunt apply — prod
        working-directory: iac/environments/prod
        run: terragrunt apply -auto-approve
        env:
          TF_VAR_backend_image: ${{ env.IMAGE_PREFIX }}/k8s-istio-platform-backend:${{ github.sha }}
          TF_VAR_frontend_image: ${{ env.IMAGE_PREFIX }}/k8s-istio-platform-frontend:${{ github.sha }}

      - name: Wait for rollout — prod
        run: |
          kubectl rollout status deployment/mesh-api -n k8s-istio-platform-prod --timeout=120s
          kubectl rollout status deployment/mesh-ui -n k8s-istio-platform-prod --timeout=120s
